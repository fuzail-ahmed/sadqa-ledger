services:
  app:
    image: ghcr.io/fuzail-ahmed/sadqa-ledger:${APP_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      DATABASE_PATH: /data/sadqa-ledger.db
    volumes:
      - sadqa-ledger-data:/data
      - sadqa-ledger-uploads:/app/uploads
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  litestream:
    image: litestream/litestream:0.3
    user: "65532:65532"
    restart: unless-stopped
    env_file:
      - .env
    command: ["replicate", "-config", "/etc/litestream.yml"]
    volumes:
      - sadqa-ledger-data:/data
      - ./litestream.yml:/etc/litestream.yml:ro
    depends_on:
      app:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  sadqa-ledger-data:
    name: sadqa-ledger-data
  sadqa-ledger-uploads:
    name: sadqa-ledger-uploads
  caddy-data:
    name: sadqa-ledger-caddy-data
  caddy-config:
    name: sadqa-ledger-caddy-config
